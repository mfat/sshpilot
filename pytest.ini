[pytest]
testpaths = tests
norecursedirs = .flatpak-builder builddir build dist .venv venv .git *.egg-info manual
markers =
    integration: Integration-level tests that exercise GTK components without full UI automation.
    e2e: End-to-end UI tests that rely on Dogtail and AT-SPI.
    gui: Real-GTK GUI tests that boot the app on a display. Opt-in only; run with
        SSHPILOT_GUI_TESTS=1 pytest -m gui (auto-skip without PyGObject + a display).
addopts = -m "not gui"
