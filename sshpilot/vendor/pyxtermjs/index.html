<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sshPilot Terminal</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: arial;
        background-color: #1e1e1e;
        color: #ffffff;
      }
      #terminal {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .xterm-viewport {
        height: 100% !important;
      }
      .xterm-screen {
        height: 100% !important;
      }
    </style>

      <style id="sshpilot-terminal-font">
        .xterm {
          font-family: 'Liberation Mono', monospace !important;
          font-size: 16.0pt !important;
        }
        .xterm .xterm-screen {
          font-family: 'Liberation Mono', monospace !important;
          font-size: 16.0pt !important;
        }
      </style>
    <link
      rel="stylesheet"
      href="xterm/xterm.css"
    />
  </head>
  <body>
    <div id="terminal"></div>

    <!-- xterm (served locally by the app; no CDN) -->
    <script src="xterm/xterm.js"></script>
    <script src="xterm/addons/fit/xterm-addon-fit.js"></script>
    <script src="xterm/addons/webLinks/xterm-addon-web-links.js"></script>
    <script src="xterm/addons/search/xterm-addon-search.js"></script>

    <script>
      const term = new Terminal({
        cursorBlink: true,
        fontFamily: 'JetBrains Mono',
        fontSize: 14,
        macOptionIsMeta: true,
        scrollback: 1000,
        theme: {
                  "background": "#000000",
                  "foreground": "#FFFFFF",
                  "cursor": "#FFFFFF",
                  "selectionBackground": "#4A90E2",
                  "selectionForeground": "#FFFFFF",
                  "black": "#000000",
                  "red": "#CC0000",
                  "green": "#4E9A06",
                  "yellow": "#C4A000",
                  "blue": "#3465A4",
                  "magenta": "#75507B",
                  "cyan": "#06989A",
                  "white": "#D3D7CF",
                  "brightBlack": "#555753",
                  "brightRed": "#EF2929",
                  "brightGreen": "#8AE234",
                  "brightYellow": "#FCE94F",
                  "brightBlue": "#729FCF",
                  "brightMagenta": "#AD7FA8",
                  "brightCyan": "#34E2E2",
                  "brightWhite": "#EEEEEC"
        }
      });
      term.attachCustomKeyEventHandler(customKeyEventHandler);

      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.loadAddon(new WebLinksAddon.WebLinksAddon());
      const searchAddon = new SearchAddon.SearchAddon();
      term.loadAddon(searchAddon);
      term.searchAddon = searchAddon;  // Store reference for external access

      // Expose terminal and fit addon globally for debugging and automated testing hooks
      window.term = term;
      window.fit = fit;  // Expose fit addon so we can call fit.fit() after font size changes

      term.open(document.getElementById("terminal"));
      fit.fit();
      term.resize(15, 50);
      console.log(`size: ${term.cols} columns, ${term.rows} rows`);
      fit.fit();

      // Auto-focus the terminal when it's ready
      setTimeout(() => {
        term.focus();
        console.log('Terminal auto-focused');
      }, 100);

      // Native WebSocket transport (JSON text frames), no Socket.IO.
      const wsProto = window.location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${wsProto}//${window.location.host}/pty`);

      // Expose the socket and a small send helper globally so the app can send
      // programmatic input (e.g. broadcast commands via feed_child).
      window.socket = socket;
      window.ptySend = function (obj) {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(obj));
          return true;
        }
        return false;
      };

      term.onData((data) => {
        console.log("browser terminal received new data:", data);
        window.ptySend({ type: "input", data: data });
      });

      socket.onmessage = (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          return;
        }
        if (msg.type === "output") {
          term.write(msg.data);
        }
      };

      socket.onopen = () => {
        fitToscreen();
      };

      socket.onclose = () => {
        // Handle disconnect if needed
      };

      function fitToscreen() {
        fit.fit();
        const dims = { type: "resize", cols: term.cols, rows: term.rows };
        console.log("sending new dimensions to server's pty", dims);
        window.ptySend(dims);
      }

      function debounce(func, wait_ms) {
        let timeout;
        return function (...args) {
          const context = this;
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(context, args), wait_ms);
        };
      }

      /**
       * Handle copy and paste events
       */
      function customKeyEventHandler(e) {
        if (e.type !== "keydown") {
          return true;
        }
        if (e.ctrlKey && e.shiftKey) {
          const key = e.key.toLowerCase();
          if (key === "v") {
            // ctrl+shift+v: paste whatever is in the clipboard
            navigator.clipboard.readText().then((toPaste) => {
              term.paste(toPaste);
            });
            return false;
          } else if (key === "c" || key === "x") {
            // ctrl+shift+x: copy whatever is highlighted to clipboard
            const toCopy = term.getSelection();
            navigator.clipboard.writeText(toCopy);
            term.focus();
            return false;
          }
        }
        return true;
      }

      const wait_ms = 50;
      window.onresize = debounce(fitToscreen, wait_ms);
    </script>
  </body>
</html>
