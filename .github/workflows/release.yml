name: Release

# Manual, non-interactive twin of scripts/release.sh: bump the version on the
# dev branch, merge it into main, tag, and push. The tag push is what makes the
# existing build-deb / build-rpm / macOS / flathub workflows run.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version, e.g. 5.5.8'
        required: true
        type: string
      changelog:
        description: 'Release notes, one per line. Leave empty to derive them from the commits since the last release.'
        required: false
        type: string
      prerelease:
        description: 'Mark the GitHub release as a pre-release (skips APT/Homebrew/Flathub)'
        required: false
        type: boolean
        default: false
      dev_branch:
        description: 'Branch to release from'
        default: dev
        type: string
      main_branch:
        description: 'Branch to merge into and tag'
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # A tag pushed with the default GITHUB_TOKEN does NOT trigger the
      # `on: push: tags` workflows, so the release would build nothing. Check out
      # (and therefore push) with a PAT instead.
      - name: Check the release token
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.PPA_TRIGGER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::No RELEASE_TOKEN (or PPA_TRIGGER_TOKEN) secret is set."
            echo "::error::A PAT is required: tags pushed with GITHUB_TOKEN do not trigger the build workflows."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.PPA_TRIGGER_TOKEN }}
          ref: ${{ inputs.dev_branch }}
          fetch-depth: 0

      # dch writes debian/changelog, which is the version of record for the PPA.
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Validate the version
        id: check
        run: |
          set -eu
          VERSION='${{ inputs.version }}'
          VERSION=${VERSION#v}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi
          # Read the version currently on the release branch. An interrupted
          # previous run may have already pushed the bump (and nothing else),
          # in which case we skip re-bumping and resume at merge/tag.
          CURRENT=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("src/sshpilot/__init__.py").read_text(encoding="utf-8")
          match = re.search(r"""__version__\s*=\s*['"]([^'"]+)['"]""", text)
          print(match.group(1) if match else "0.0.0")
          PY
          )
          if [ "$VERSION" = "$CURRENT" ]; then
            ALREADY_BUMPED=true
            # Changelog derivation still wants the prior release tag.
            PREVIOUS=$(git describe --tags --abbrev=0 --match 'v[0-9]*' HEAD^ 2>/dev/null || true)
            PREVIOUS=${PREVIOUS#v}
            if [ -z "$PREVIOUS" ]; then
              echo "::error::Could not determine the previous release tag."
              exit 1
            fi
            echo "Version already bumped to $VERSION; resuming merge/tag."
          else
            ALREADY_BUMPED=false
            # Same semver + must-increase rules the interactive helper applies.
            PREVIOUS=$(scripts/bump-version.sh --check "$VERSION")
            echo "Releasing $PREVIOUS -> $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          echo "already_bumped=$ALREADY_BUMPED" >> "$GITHUB_OUTPUT"

      - name: Assemble the changelog
        id: changelog
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          PREVIOUS: ${{ steps.check.outputs.previous }}
        run: |
          set -eu
          if [ -n "${INPUT_CHANGELOG//[[:space:]]/}" ]; then
            printf '%s\n' "$INPUT_CHANGELOG" > ${RUNNER_TEMP}/changelog.txt
          else
            # Fall back to the commit subjects since the previous release, minus
            # the housekeeping ones nobody wants in GNOME Software.
            git log --no-merges --pretty=%s "v${PREVIOUS}..HEAD" \
              | grep -vEi '^(chore|ci|test|docs|refactor)[(:]|^Bump version to |^Merge ' \
              > ${RUNNER_TEMP}/changelog.txt || true
          fi
          if [ ! -s ${RUNNER_TEMP}/changelog.txt ]; then
            echo "::error::Changelog is empty and nothing could be derived from the commits."
            exit 1
          fi
          echo "--- release notes ---"
          cat "$RUNNER_TEMP/changelog.txt"

      - name: Bump the version
        if: steps.check.outputs.already_bumped != 'true'
        run: scripts/bump-version.sh '${{ steps.check.outputs.version }}' < ${RUNNER_TEMP}/changelog.txt

      - name: Push the bump to ${{ inputs.dev_branch }}
        if: steps.check.outputs.already_bumped != 'true'
        run: |
          set -eu
          git commit -am "Bump version to ${{ steps.check.outputs.version }}"
          git push origin '${{ inputs.dev_branch }}'

      - name: Merge into ${{ inputs.main_branch }} and tag
        run: |
          set -eu
          VERSION='${{ steps.check.outputs.version }}'
          git checkout '${{ inputs.main_branch }}'
          git pull --ff-only origin '${{ inputs.main_branch }}'
          # Unlike the interactive helper there is nobody here to judge a
          # conflict, so fail rather than guess which side is right.
          git merge --no-ff '${{ inputs.dev_branch }}' \
            -m "Merge ${{ inputs.dev_branch }} into ${{ inputs.main_branch }} for v$VERSION"
          # Match scripts/release.sh: two -m paragraphs (title + body).
          # Git rejects combining -m with -F.
          git tag -a "v$VERSION" \
            -m "SSH Pilot v$VERSION" \
            -m "$(cat "${RUNNER_TEMP}/changelog.txt")"
          git push origin '${{ inputs.main_branch }}'
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.PPA_TRIGGER_TOKEN }}
        run: |
          set -eu
          VERSION='${{ steps.check.outputs.version }}'
          NOTES="${RUNNER_TEMP}/changelog.txt"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            ARGS=(
              release edit "v$VERSION"
              --title "SSH Pilot v$VERSION"
              --notes-file "$NOTES"
            )
            if [ '${{ inputs.prerelease }}' = 'true' ]; then
              ARGS+=(--prerelease --latest=false)
            else
              ARGS+=(--prerelease=false)
            fi
          else
            ARGS=(
              release create "v$VERSION"
              --verify-tag
              --title "SSH Pilot v$VERSION"
              --notes-file "$NOTES"
            )
            if [ '${{ inputs.prerelease }}' = 'true' ]; then
              ARGS+=(--prerelease --latest=false)
            fi
          fi
          gh "${ARGS[@]}"

      # Runs after the tag is pushed: the PKGBUILD checksum covers the tarball
      # GitHub generates for the tag. main-only, so the merge above can never
      # conflict over it.
      - name: Update the Arch PKGBUILD
        run: |
          set -eu
          VERSION='${{ steps.check.outputs.version }}'
          scripts/update-arch-pkgbuild.sh "$VERSION"
          git commit -am "Update Arch PKGBUILD for v$VERSION"
          git push origin '${{ inputs.main_branch }}'

      - name: Summary
        run: |
          VERSION='${{ steps.check.outputs.version }}'
          KIND=release
          if [ '${{ inputs.prerelease }}' = 'true' ]; then
            KIND=pre-release
          fi
          {
            echo "### Released v$VERSION ($KIND)"
            echo
            echo "Tag \`v$VERSION\` pushed — the .deb, .rpm, macOS and Flathub workflows build from it."
            if [ "$KIND" = "pre-release" ]; then
              echo "APT / Homebrew / Flathub updates are skipped for pre-releases."
            fi
            echo
            echo '```'
            cat "$RUNNER_TEMP/changelog.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
