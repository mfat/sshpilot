name: Build Debian Package

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build deps come from debian/control itself via mk-build-deps, so this
      # workflow can never drift from what the packaging actually declares.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts equivs lintian
          sudo mk-build-deps --install --remove \
            --tool 'apt-get -y --no-install-recommends' debian/control

      # debian/changelog is the version of record for the .deb; scripts/release.sh
      # keeps it in step with src/sshpilot/__init__.py and meson.build.
      - name: Extract version
        id: version
        run: |
          VERSION=$(dpkg-parsechangelog -S Version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building sshpilot $VERSION"

      # Builds with Meson via dh --buildsystem=meson (see debian/rules). Meson
      # installs the launcher, package, gresource, desktop entry, metainfo, icon
      # and sshpilot-agent, and its desktop/AppStream validators run as the
      # build-time test suite.
      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect packages
        run: |
          mkdir -p artifacts
          find .. -maxdepth 1 -name '*.deb' -exec mv {} artifacts/ \;
          ls -la artifacts/

      - name: Verify package contents
        run: |
          set -eu
          DEB=$(ls artifacts/*.deb | head -1)
          contents=$(dpkg-deb --contents "$DEB")
          # Everything the app needs at runtime must be present...
          for path in \
            ./usr/bin/sshpilot \
            ./usr/bin/sshpilot-agent \
            ./usr/share/io.github.mfat.sshpilot/io.github.mfat.sshpilot.gresource \
            ./usr/share/applications/io.github.mfat.sshpilot.desktop \
            ./usr/share/metainfo/io.github.mfat.sshpilot.metainfo.xml \
            ./usr/share/icons/hicolor/scalable/apps/io.github.mfat.sshpilot.svg \
          ; do
            grep -q " $path\$" <<<"$contents" || { echo "::error::missing $path"; exit 1; }
          done
          # ...and the build-time-only files must not be.
          for pattern in '[.]blp$' 'plugins/examples' 'vendor/pyxtermjs/xterm/' '__pycache__'; do
            if grep -qE "$pattern" <<<"$contents"; then
              echo "::error::$pattern should not ship in the .deb"; exit 1
            fi
          done
          echo "package contents verified"

      - name: Lintian
        run: lintian --tag-display-limit 0 artifacts/*.deb

      - name: Show package info
        run: |
          for deb in artifacts/*.deb; do
            echo "=== $deb ==="
            dpkg-deb --info "$deb"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages-${{ steps.version.outputs.version }}
          path: artifacts/*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.deb
          generate_release_notes: false
          body: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger APT repository publish
        if: startsWith(github.ref, 'refs/tags/')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PPA_TRIGGER_TOKEN }}
          repository: mfat/sshpilot-ppa
          event-type: sshpilot_release_published
          client-payload: >-
            {
              "tag": "${{ github.ref_name }}",
              "release_id": "build-deb-dispatch",
              "release_html_url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
              "triggered_by_repo": "${{ github.repository }}",
              "triggered_at": "",
              "workflow_run_id": "${{ github.run_id }}"
            }
