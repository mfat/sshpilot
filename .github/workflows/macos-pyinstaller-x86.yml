name: Build macOS PyInstaller Bundle (Intel x86_64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-x86_64:
    name: macOS x86_64 PyInstaller
    runs-on: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Homebrew dependencies
        run: |
          brew update
          
          # Forcefully unlink any conflicting brew versions
          for v in 3.14 3.13 3.12 3.11 3.10; do
            brew unlink python@$v 2>/dev/null || true
          done
          
          # Remove conflicting non-brew macOS Python framework symlinks
          sudo rm -f /usr/local/bin/idle3.13 \
                     /usr/local/bin/pip3.13 \
                     /usr/local/bin/pydoc3.13 \
                     /usr/local/bin/python3.13 \
                     /usr/local/bin/python3.13-config

          # Install with overwrite flag to prevent linking errors
          brew install --overwrite python@3.13 gtk4 libadwaita vte3 gtksourceview5 \
            adwaita-icon-theme gobject-introspection pygobject3 py3cairo \
            create-dmg sshpass
            
          brew link --overwrite --force python@3.13
          brew link --overwrite libadwaita

      - name: Prepare Homebrew virtual environment
        run: |
          PYTHON_PATH="$(brew --prefix python@3.13)/bin/python3.13"
          echo "Using Python: $PYTHON_PATH"
          "$PYTHON_PATH" --version
          "$PYTHON_PATH" -m venv .venv-homebrew --system-site-packages
          source .venv-homebrew/bin/activate
          python -m pip install --upgrade pip wheel
          python -m pip install cryptography keyring psutil certifi pykeepass PyInstaller pyinstaller-hooks-contrib

      - name: Build application bundle with PyInstaller
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PATH="$BREW_PREFIX/bin:$PATH"
          export GI_TYPELIB_PATH="$BREW_PREFIX/lib/girepository-1.0"
          export DYLD_LIBRARY_PATH="$BREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
          export PKG_CONFIG_PATH="$BREW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export XDG_DATA_DIRS="$BREW_PREFIX/share:$XDG_DATA_DIRS"
          chmod +x packaging/pyinstaller/pyinstaller.sh
          ./packaging/pyinstaller/pyinstaller.sh

      - name: Verify sshpass bundled correctly
        run: |
          SSHPASS_PATH="dist/SSHPilot.app/Contents/Resources/bin/sshpass"
          echo "=== CHECK: Verifying sshpass bundle at $SSHPASS_PATH ==="
          if [ ! -f "$SSHPASS_PATH" ]; then
            echo "=== ERROR: sshpass NOT found at expected path: $SSHPASS_PATH ==="
            echo "=== Searching entire bundle for sshpass: ==="
            find dist/SSHPilot.app -name "sshpass" 2>/dev/null || echo "sshpass not found anywhere in bundle"
            exit 1
          fi
          echo "=== CHECK: sshpass found ==="
          ls -la "$SSHPASS_PATH"
          file "$SSHPASS_PATH"
          if [ ! -x "$SSHPASS_PATH" ]; then
            echo "=== ERROR: sshpass is not executable ==="
            exit 1
          fi
          echo "=== CHECK: sshpass is executable ==="
          if ! file "$SSHPASS_PATH" | grep -q "x86_64"; then
            echo "=== ERROR: sshpass does not contain x86_64 slice — architecture mismatch ==="
            exit 1
          fi
          echo "=== CHECK: sshpass x86_64 architecture verified ==="


      - name: Determine artifact names
        id: artifact-info
        run: |
          VERSION=$(grep -o '__version__ = "[^"]*"' sshpilot/__init__.py | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            VERSION=$(date +%Y%m%d)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg=sshPilot-macOS-${VERSION}-x86_64.dmg" >> "$GITHUB_OUTPUT"

      - name: Verify build outputs
        run: |
          ls -la dist/
          [ -d "dist/SSHPilot.app" ] || (echo "ERROR: SSHPilot.app not found" && exit 1)

      - name: Compress app bundle for artifact upload
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/SSHPilot.app dist/SSHPilot.app.zip

      - name: Generate DMG checksum
        run: |
          DMG_NAME="${{ steps.artifact-info.outputs.dmg }}"
          [ -f "dist/$DMG_NAME" ] || (echo "ERROR: DMG not found" && ls -la dist/ && exit 1)
          shasum -a 256 "dist/$DMG_NAME" > "dist/$DMG_NAME.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshpilot-${{ steps.artifact-info.outputs.version }}-macos-x86_64-dmg
          path: dist/${{ steps.artifact-info.outputs.dmg }}
        continue-on-error: true

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshpilot-${{ steps.artifact-info.outputs.version }}-macos-x86_64-app
          path: dist/SSHPilot.app.zip
        continue-on-error: true

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshpilot-${{ steps.artifact-info.outputs.version }}-macos-x86_64-checksum
          path: dist/${{ steps.artifact-info.outputs.dmg }}.sha256
        continue-on-error: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ steps.artifact-info.outputs.dmg }}
          generate_release_notes: false
          body: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
