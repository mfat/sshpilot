name: Trigger PPA (Manual)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to dispatch (example: v1.2.3)'
        required: true
        type: string

jobs:
  trigger-ppa:
    if: startsWith(github.event.inputs.release_tag, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release event to sshpilot-ppa
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PPA_TRIGGER_TOKEN }}
          repository: mfat/sshpilot-ppa
          event-type: sshpilot_release_published
          client-payload: >-
            {
              "tag": "${{ github.event.inputs.release_tag }}",
              "release_id": "manual-dispatch",
              "release_html_url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.release_tag }}",
              "triggered_by_repo": "${{ github.repository }}",
              "triggered_at": "",
              "workflow_run_id": "${{ github.run_id }}"
            }
