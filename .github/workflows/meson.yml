name: Meson build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # blueprint-compiler + glib tooling build the UI and gresource;
      # desktop-file-utils and appstream provide the validators `meson test` runs;
      # gettext drives the po/ catalogs.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build blueprint-compiler \
            libglib2.0-bin libglib2.0-dev-bin \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            desktop-file-utils appstream gettext

      - name: Configure
        run: meson setup builddir --prefix="$GITHUB_WORKSPACE/_install"

      - name: Compile
        run: meson compile -C builddir

      # Validates the merged .desktop and AppStream metainfo.
      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: Install
        run: meson install -C builddir

      # The install is only useful if the pieces the app looks for at runtime
      # actually landed: both binaries, the gresource, and the generated
      # build_config that points the app at the prefix.
      - name: Verify installed layout
        run: |
          cd "$GITHUB_WORKSPACE/_install"
          set -x
          test -x bin/sshpilot
          test -x bin/sshpilot-agent
          test -f share/io.github.mfat.sshpilot/io.github.mfat.sshpilot.gresource
          test -f share/applications/io.github.mfat.sshpilot.desktop
          test -f share/metainfo/io.github.mfat.sshpilot.metainfo.xml
          test -f share/icons/hicolor/scalable/apps/io.github.mfat.sshpilot.svg
          test -f lib/python3/dist-packages/sshpilot/build_config.py
          # Example plugins and Blueprint sources are build-time only.
          test ! -d lib/python3/dist-packages/sshpilot/plugins/examples
          test ! -d lib/python3/dist-packages/sshpilot/resources/ui

      # Catches gresource paths that compile but are missing at runtime, and a
      # build_config that points somewhere the install did not populate.
      - name: Load the installed gresource
        run: |
          sudo apt-get install -y python3-gi
          PYTHONPATH="$GITHUB_WORKSPACE/_install/lib/python3/dist-packages" \
          python3 - <<'PY'
          import os
          from gi.repository import Gio
          from sshpilot import build_config as bc

          res = Gio.Resource.load(
              os.path.join(bc.PKGDATADIR, "io.github.mfat.sshpilot.gresource")
          )
          Gio.resources_register(res)
          ui = res.enumerate_children("/io/github/mfat/sshpilot/ui", 0)
          assert len(ui) > 20, f"expected the compiled .ui files, got {ui}"
          res.lookup_data("/io/github/mfat/sshpilot/style.css", 0)
          print(f"gresource OK: {len(ui)} .ui files, style.css present")
          PY

      # The prefix here is not on the default sys.path, so this only passes if
      # the generated launcher adds its own install dir. Deliberately no
      # PYTHONPATH -- that would hide the very thing being checked.
      - name: Launcher resolves the package without PYTHONPATH
        run: cd / && "$GITHUB_WORKSPACE/_install/bin/sshpilot" --help > /dev/null

      - name: Build a dist tarball
        run: meson dist -C builddir --no-tests
