name: Build RPM Package

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      # Must precede the checkout: fedora:latest ships no git, and without it
      # actions/checkout silently falls back to downloading a REST tarball,
      # leaving no .git for `git archive` to build the source tarball from.
      - name: Install git
        run: dnf install -y git-core

      - uses: actions/checkout@v4

      # Build deps come from packaging/fedora/rpm.spec itself via dnf builddep,
      # so this workflow can never drift from what the packaging declares.
      #
      # --disablerepo=fedora-cisco-openh264: builddep pulls the whole GTK/VTE
      # tree, which reaches openh264. That package is hosted on Cisco's own
      # server, not a Fedora mirror, and it is unreachable from the runners --
      # the job died on "All mirrors were tried". Fedora's main repo carries a
      # noopenh264 stub providing the same capability, so dropping the repo
      # lets the depsolve pick that instead.
      - name: Install build dependencies
        run: |
          dnf install -y --disablerepo=fedora-cisco-openh264 \
            rpm-build rpmdevtools rpmlint dnf5-plugins
          dnf builddep -y --disablerepo=fedora-cisco-openh264 packaging/fedora/rpm.spec

      # The spec is the version of record for the RPM; scripts/release.sh keeps
      # it in step with src/sshpilot/__init__.py and meson.build.
      - name: Extract version
        id: version
        run: |
          VERSION=$(rpmspec -q --srpm --qf '%{version}\n' packaging/fedora/rpm.spec)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building sshpilot $VERSION"

      - name: Create source tarball
        run: |
          set -eu
          rpmdev-setuptree
          VER='${{ steps.version.outputs.version }}'
          git config --global --add safe.directory "$PWD"
          # -o rather than a pipe into gzip: `set -e` does not see a failure on
          # the left of a pipe, so a broken git archive used to yield a valid
          # gzip of nothing and only blow up later in rpmbuild's %prep.
          git archive --format=tar.gz --prefix="sshpilot-${VER}/" \
            -o ~/rpmbuild/SOURCES/sshpilot-${VER}.tar.gz HEAD

      # Builds with Meson (see the spec). Meson installs the launcher, package,
      # gresource, desktop entry, metainfo, icon and sshpilot-agent, and its
      # desktop/AppStream validators run as %check.
      - name: Build RPM package
        run: |
          rpmbuild -ba packaging/fedora/rpm.spec
          mkdir -p artifacts
          find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Verify package contents
        run: |
          set -eu
          RPM=$(ls artifacts/*.noarch.rpm | head -1)
          contents=$(rpm -qlp "$RPM")
          # Everything the app needs at runtime must be present. The two
          # /usr/share/sshpilot entries are the Python payload and the bundled
          # xterm.js the PyXterm backend falls back to when the distro has no
          # system copy -- both moved out of site-packages, so assert them here
          # rather than find out from a user that the app cannot import itself.
          for path in \
            /usr/bin/sshpilot \
            /usr/bin/sshpilot-agent \
            /usr/share/io.github.mfat.sshpilot/io.github.mfat.sshpilot.gresource \
            /usr/share/applications/io.github.mfat.sshpilot.desktop \
            /usr/share/metainfo/io.github.mfat.sshpilot.metainfo.xml \
            /usr/share/icons/hicolor/scalable/apps/io.github.mfat.sshpilot.svg \
            /usr/share/sshpilot/sshpilot/main.py \
            /usr/share/sshpilot/sshpilot/vendor/pyxtermjs/xterm/xterm.js \
          ; do
            grep -qx "$path" <<<"$contents" || { echo "::error::missing $path"; exit 1; }
          done
          # ...and the build-time-only files must not be.
          for pattern in '[.]blp$' 'plugins/examples' 'resources/ui/'; do
            if grep -qE "$pattern" <<<"$contents"; then
              echo "::error::$pattern should not ship in the RPM"; exit 1
            fi
          done
          echo "package contents verified"

      - name: Rpmlint
        run: rpmlint artifacts/*.noarch.rpm || echo "rpmlint warnings (non-fatal)"

      - name: Show package info
        run: |
          for rpm in artifacts/*.rpm; do
            echo "=== $rpm ==="
            rpm -qip "$rpm"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages-${{ steps.version.outputs.version }}
          path: artifacts/*.noarch.rpm

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.noarch.rpm
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
