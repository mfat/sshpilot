name: Tests

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Tests don't drive a real GTK display (conftest.py stubs gi.repository),
      # but PyGObject still needs glib / girepository headers at install time.
      - name: Install system build deps for PyGObject and pycairo
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            python3-dev

      - name: Install project (editable) and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run pytest
        run: pytest -ra
