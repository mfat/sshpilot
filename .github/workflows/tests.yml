name: Tests

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Tests stub gi.repository in tests/conftest.py and never load real GTK,
      # so we skip PyGObject / pycairo entirely (--no-deps) and install only
      # the runtime libs the test suite actually exercises through sshpilot.
      - name: Install project (no GTK) and test deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install \
            paramiko \
            cryptography \
            keyring \
            psutil \
            pytest \
            pytest-cov \
            jsonschema

      # Unit suite only — the `integration` tests run the real tool binaries and
      # live in the containerized "Test environment" workflow.
      - name: Run pytest
        run: pytest -ra -m "not integration"
