name: Update Flathub Manifest

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v5.3.0
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (example: v5.3.0)'
        required: true
        type: string

jobs:
  update-flathub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Resolve commit for tag
        id: commit
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REPO="https://github.com/mfat/sshpilot.git"
          # Dereference annotated tags to the underlying commit; fall back to a
          # lightweight tag if there is no peeled ref.
          SHA=$(git ls-remote "$REPO" "refs/tags/${TAG}^{}" | awk '{print $1}')
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "$REPO" "refs/tags/${TAG}" | awk '{print $1}')
          fi
          if [ -z "$SHA" ]; then
            echo "Could not resolve a commit for $TAG" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG -> $SHA"

      - name: Checkout Flathub manifest repo
        uses: actions/checkout@v4
        with:
          repository: flathub/io.github.mfat.sshpilot
          token: ${{ secrets.FLATHUB_TOKEN }}
          path: flathub

      - name: Update pinned commit in manifest
        env:
          TAG: ${{ steps.release.outputs.tag }}
          SHA: ${{ steps.commit.outputs.sha }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          tag, sha = os.environ["TAG"], os.environ["SHA"]
          manifest = pathlib.Path("flathub/io.github.mfat.sshpilot.yaml")
          text = manifest.read_text()

          # Target the sshpilot git source (the only type: git / commit: in the
          # manifest) and rewrite its #tag comment + pinned commit, preserving
          # indentation.
          pattern = re.compile(
              r'(url:\s*"?https://github\.com/mfat/sshpilot\.git"?[ \t]*\n)'
              r'(?:[ \t]*#tag:[^\n]*\n)?'
              r'([ \t]*)commit:[ \t]*[0-9a-fA-F]+'
          )

          def repl(match):
              indent = match.group(2)
              return f"{match.group(1)}{indent}#tag: {tag}\n{indent}commit: {sha}"

          new_text, count = pattern.subn(repl, text, count=1)
          if count != 1:
              raise SystemExit("Failed to update the pinned commit in the manifest")

          manifest.write_text(new_text)
          print(f"Updated manifest to {tag} ({sha})")
          PY

      - name: Open pull request on Flathub repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FLATHUB_TOKEN }}
          path: flathub
          base: master
          branch: update-to-${{ steps.release.outputs.tag }}
          delete-branch: true
          commit-message: "Update to ${{ steps.release.outputs.tag }}"
          title: "Update to ${{ steps.release.outputs.tag }}"
          body: |
            Automated manifest bump to ${{ steps.release.outputs.tag }}.

            commit: ${{ steps.commit.outputs.sha }}
