name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install "ruff==0.15.17"

      - name: ruff check
        run: ruff check src/ tests/

  resources:
    # Guard against committed UI artifacts drifting from their Blueprint source:
    # recompile .blp -> .ui and the gresource, then fail if anything changed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No actions/setup-python: blueprintcompiler/gir.py imports gi, and only
      # the system interpreter can see apt's python3-gi. The gir1.2-* typelibs
      # are what `using Gtk 4.0` / `using Adw 1` resolve against.
      - name: Install GResource tooling
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libglib2.0-bin libglib2.0-dev-bin \
            python3-gi gir1.2-gtk-4.0 gir1.2-adw-1

      # Pinned, and deliberately not the apt package: this job compares generated
      # .ui/.gresource byte-for-byte, and blueprint-compiler's output format
      # changes between versions. ubuntu-latest ships 0.12.0, whose output
      # differs from every release since 0.18.0 -- it reported 17 stale files
      # against a tree that reproduces exactly. Run it from a source checkout
      # rather than PyPI: the wheel depends on PyGObject, which pip builds from
      # source and which needs cairo headers the runner does not have.
      #
      # v0.18.0, v0.20.0, v0.20.4 and v0.22.2 were each verified to regenerate
      # the committed files with a zero diff; bump only alongside a regenerated
      # commit.
      - name: Install blueprint-compiler
        run: |
          git clone --depth 1 --branch v0.20.4 \
            https://gitlab.gnome.org/jwestman/blueprint-compiler.git "$RUNNER_TEMP/bp"
          printf '#!/bin/sh\nexec python3 "%s/blueprint-compiler.py" "$@"\n' "$RUNNER_TEMP/bp" \
            | sudo tee /usr/local/bin/blueprint-compiler >/dev/null
          sudo chmod +x /usr/local/bin/blueprint-compiler
          blueprint-compiler --version

      - name: Recompile resources
        run: |
          cp src/sshpilot/resources/sshpilot.gresource "$RUNNER_TEMP/committed.gresource"
          bash scripts/build_gresource.sh

      # The .ui files are compared byte-for-byte, which is safe now that the
      # compiler is pinned. The .gresource blob is not: its exact bytes depend on
      # the glib-compile-resources version, which laid out identical inputs
      # ~15KB apart between the runner's glib and a current one. So compare what
      # the blob contains rather than what it weighs -- that also catches a
      # non-Blueprint resource (style.css, an icon) changing without a rebuild,
      # which a diff restricted to ui/ would miss.
      - name: Fail if committed .ui / .gresource are stale
        run: |
          if ! git diff --quiet -- src/sshpilot/resources/ui; then
            echo "::error::Committed .ui are out of date with the .blp sources."
            echo "Run scripts/build_gresource.sh and commit the result."
            git --no-pager diff --stat -- src/sshpilot/resources/ui
            exit 1
          fi

          old="$RUNNER_TEMP/committed.gresource"
          new=src/sshpilot/resources/sshpilot.gresource
          if ! diff <(gresource list "$old") <(gresource list "$new"); then
            echo "::error::Committed .gresource does not hold the same set of resources."
            echo "Run scripts/build_gresource.sh and commit the result."
            exit 1
          fi
          stale=0
          while read -r res; do
            cmp -s <(gresource extract "$old" "$res") <(gresource extract "$new" "$res") \
              || { echo "::error::stale resource: $res"; stale=1; }
          done < <(gresource list "$new")
          if [ "$stale" -ne 0 ]; then
            echo "Run scripts/build_gresource.sh and commit the result."
            exit 1
          fi
