name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install "ruff==0.15.17"

      - name: ruff check
        run: ruff check src/ tests/

  resources:
    # Guard against committed UI artifacts drifting from their Blueprint source:
    # recompile .blp -> .ui and the gresource, then fail if anything changed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # blueprint-compiler resolves `using Gtk 4.0` / `using Adw 1` against the
      # introspection typelibs, so the gir1.2-* packages are not optional.
      - name: Install GResource tooling
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libglib2.0-bin libglib2.0-dev-bin \
            gir1.2-gtk-4.0 gir1.2-adw-1

      # Pinned, and deliberately not the apt package: this job compares generated
      # .ui/.gresource byte-for-byte, and blueprint-compiler's output format
      # changes between versions. ubuntu-latest ships 0.12.0, whose output
      # differs from every release since 0.18.0 -- which would fail this check on
      # a tree that is perfectly in sync. Any 0.18.0+ reproduces the committed
      # files exactly; bump this only alongside a regenerated commit.
      - name: Install blueprint-compiler
        run: pip install "blueprint-compiler==0.22.2"

      - name: Recompile resources
        run: bash scripts/build_gresource.sh

      - name: Fail if committed .ui / .gresource are stale
        run: |
          if ! git diff --quiet -- src/sshpilot/resources; then
            echo "::error::Committed .ui/.gresource are out of date with the .blp sources."
            echo "Run scripts/build_gresource.sh and commit the result."
            git --no-pager diff --stat -- src/sshpilot/resources
            exit 1
          fi
