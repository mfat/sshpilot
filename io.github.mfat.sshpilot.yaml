app-id: io.github.mfat.sshpilot
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: sshpilot
separate-locales: false
# WebKit 6.0 is required for PyXterm.js backend and should be available in GNOME Platform 49
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=ssh-auth
  - --device=dri
  - --filesystem=~/.ssh:create
  - --talk-name=org.freedesktop.Flatpak

cleanup:
  - '/include'
  - '/lib/pkgconfig'
  - '/share/gtk-doc'
  - '/share/man'
  - '*.la'
  - '*.a'

modules:
  - name: sshpass
    buildsystem: autotools
    sources:
      - type: archive
        url: https://sourceforge.net/projects/sshpass/files/sshpass/1.09/sshpass-1.09.tar.gz
        sha256: 71746e5e057ffe9b00b44ac40453bf47091930cba96bbea8dc48717dedc49fb7

  - name: ssh-copy-id
    buildsystem: simple
    build-commands:
    - install -Dm755 ssh-copy-id /app/bin/ssh-copy-id
    sources:
    - type: file
      url: https://raw.githubusercontent.com/openssh/openssh-portable/V_9_6_P1/contrib/ssh-copy-id
      sha256: b625120eeff8b0e64e4e8c71e5ed3a7878fd69d318a88ce0a22e115725f6b815
      dest-filename: ssh-copy-id

  - name: libvte
    buildsystem: meson
    config-opts:
      - '-Dvapi=false'
      - '-Dgir=true'
      - '-Ddocs=false'
      - '-Dgnutls=true'
      - '-Dgtk3=false'
      - '-Dgtk4=true'
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.78/vte-0.78.5.tar.xz
        sha256: bab93bff8d8acb05fc7c81a469e0d17c853da3851ce4be2a66d4d18772163a46

  - flatpak/python3-deps.yml

  - name: sshpilot
    # Meson installs everything the hand-written build-commands used to: the
    # launcher, the Python package, the compiled gresource, the desktop entry and
    # metainfo (merged from the .in templates), the icon and sshpilot-agent.
    # Runtime Python deps come from flatpak/python3-deps.yml above; the GNOME SDK
    # provides meson and blueprint-compiler.
    buildsystem: meson
    sources:
      - type: dir
        # The manifest lives at the repo root -- where GNOME Builder and
        # flatpak-builder expect it -- so the source dir is just `.`.
        path: .
        # Flathub builds from `type: git`, so it only ever sees tracked files.
        # This manifest copies the working tree, so skip the local build junk to
        # keep the test build close to a clean checkout (and fast).
        skip:
          - .flatpak-builder
          - .git
          - .venv
          - venv
          - builddir
          - repo
          - .history
